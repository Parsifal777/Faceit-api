# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/Faceit
spring.datasource.username=postgres
spring.datasource.password=96541

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Server
server.port=8081

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Redis Connection pool
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ==================== ????? ????????? ??????????? ====================

# Application Logging Level
logging.level.com.faceit=DEBUG
logging.level.com.faceit.aspect=DEBUG
logging.level.com.faceit.decorator=DEBUG

# Logging pattern for console
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# File logging configuration
logging.file.name=logs/faceit-application.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# Disable some noisy loggers
logging.level.org.apache.tomcat=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot=INFO

# Optional: Log SQL query parameters more detailed
logging.level.org.hibernate.orm.jdbc.bind=TRACE